name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  node-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run test:contract

  firebase-emulators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci
      - run: npm run test:security-rules
      - run: npm run test:emulator

  flutter-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: node tools/run-flutter-workspace.mjs pub-get
      - run: npm run format:flutter
      - run: npm run analyze:flutter
      - run: npm run test:frontend
