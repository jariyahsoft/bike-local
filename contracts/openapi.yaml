openapi: 3.1.0
info:
  title: Bike Local API
  version: 0.1.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  summary: Contract-first REST API for Bike Local MVP workflows.
  description: >
    Backend API boundary for business-critical Bike Local workflows. Clients must
    use generated API clients and must not directly read or write business data in
    Firestore.
servers:
  - url: /api/v1
    description: Versioned API root
security:
  - bearerAuth: []
    appCheck: []
tags:
  - name: Identity
    description: User profile, auth identity, role selection, and self-service APIs.
  - name: Stores
    description: Store registration, approval-facing store data, and merchant settings.
  - name: Branches
    description: Branch location, operating hours, status, and pickup/return context.
  - name: Staff
    description: Staff invitations, roles, branch access, and store member updates.
  - name: Assets
    description: Bike and rentable asset inventory APIs.
  - name: Search
    description: Store and asset discovery APIs with map and availability filters.
  - name: Pricing
    description: Quote APIs for price snapshots, deposits, and policy snapshots.
  - name: Booking
    description: Booking creation, retrieval, cancellation, and state transition APIs.
  - name: Payment
    description: Online payment, webhook, cash confirmation, and refund-adjacent APIs.
  - name: Handover
    description: QR verification and handover checklist APIs.
  - name: Ride
    description: Ride session lifecycle and GPS chunk upload APIs.
  - name: Return
    description: Return request, acceptance, inspection, and rental close APIs.
  - name: SOS
    description: SOS case creation and staff response APIs.
  - name: Content
    description: Route, place, review, and moderation APIs.
  - name: Reports
    description: Merchant and platform reporting APIs.
  - name: Audit
    description: Audit log search APIs for sensitive actions.
paths:
  /users:
    post:
      tags: [Identity]
      operationId: createUser
      summary: Create a domain user profile, link the authenticated identity, and record onboarding consent.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          $ref: "#/components/responses/UserSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/VersionConflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /me:
    get:
      tags: [Identity]
      operationId: getMe
      summary: Get current user profile and auth identities.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          $ref: "#/components/responses/UserSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags: [Identity]
      operationId: updateMe
      summary: Update the current user profile, add onboarding roles, and append consent records.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          $ref: "#/components/responses/UserSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/VersionConflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /me/deletion-request:
    post:
      tags: [Identity]
      operationId: requestAccountDeletion
      summary: Request account deletion while retaining legally required transactional and audit records.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountDeletionRequest"
      responses:
        "202":
          $ref: "#/components/responses/UserSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/VersionConflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /stores:
    post:
      tags: [Stores]
      operationId: createStore
      summary: Create store draft for approval.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        $ref: "#/components/requestBodies/CreateStore"
      responses:
        "201":
          $ref: "#/components/responses/StoreSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      tags: [Stores]
      operationId: listStores
      summary: List stores visible to the current user.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Store list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Store"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /stores/{id}:
    patch:
      tags: [Stores]
      operationId: updateStore
      summary: Update store details with optimistic concurrency.
      parameters:
        - $ref: "#/components/parameters/StoreIdPath"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreRequest"
      responses:
        "200":
          $ref: "#/components/responses/StoreSuccess"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/VersionConflict"
  /stores/{id}/submit:
    post:
      tags: [Stores]
      operationId: submitStore
      summary: Submit a draft or revision-required store for platform approval.
      parameters:
        - $ref: "#/components/parameters/StoreIdPath"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitStoreRequest"
      responses:
        "200":
          $ref: "#/components/responses/StoreSuccess"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/VersionConflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /stores/{id}/approval-decisions:
    post:
      tags: [Stores]
      operationId: decideStoreApproval
      summary: Record a platform approval, rejection, revision, suspension, or closure decision.
      parameters:
        - $ref: "#/components/parameters/StoreIdPath"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreApprovalDecisionRequest"
      responses:
        "200":
          $ref: "#/components/responses/StoreSuccess"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/VersionConflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /stores/{store_id}/branches:
    post:
      tags: [Branches]
      operationId: createBranch
      summary: Create branch under a store.
      parameters:
        - $ref: "#/components/parameters/StoreIdNestedPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        $ref: "#/components/requestBodies/CreateBranch"
      responses:
        "201":
          $ref: "#/components/responses/BranchSuccess"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /branches/{id}:
    get:
      tags: [Branches]
      operationId: getBranch
      summary: Get branch by ID.
      parameters:
        - $ref: "#/components/parameters/BranchIdPath"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          $ref: "#/components/responses/BranchSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Branches]
      operationId: updateBranch
      summary: Update branch details or temporary closure state.
      parameters:
        - $ref: "#/components/parameters/BranchIdPath"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBranchRequest"
      responses:
        "200":
          $ref: "#/components/responses/BranchSuccess"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/VersionConflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /stores/{store_id}/staff-invitations:
    post:
      tags: [Staff]
      operationId: createStaffInvitation
      summary: Invite staff to a store.
      parameters:
        - $ref: "#/components/parameters/StoreIdNestedPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffInvitationRequest"
      responses:
        "202":
          description: Staff invitation accepted for processing.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/StaffInvitation"
        "403":
          $ref: "#/components/responses/Forbidden"
  /store-members/{id}:
    patch:
      tags: [Staff]
      operationId: updateStoreMember
      summary: Update store member role, branch access, or status.
      parameters:
        - $ref: "#/components/parameters/StoreMemberIdPath"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreMemberRequest"
      responses:
        "200":
          description: Store member updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/StoreMember"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/VersionConflict"
  /assets:
    post:
      tags: [Assets]
      operationId: createAsset
      summary: Create rentable asset.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"
      responses:
        "201":
          $ref: "#/components/responses/AssetSuccess"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      tags: [Assets]
      operationId: listAssets
      summary: List assets by allowed filters.
      parameters:
        - $ref: "#/components/parameters/StoreIdQuery"
        - $ref: "#/components/parameters/BranchIdQuery"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Asset list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Asset"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /assets/{id}:
    patch:
      tags: [Assets]
      operationId: updateAsset
      summary: Update asset data or status.
      parameters:
        - $ref: "#/components/parameters/AssetIdPath"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetRequest"
      responses:
        "200":
          $ref: "#/components/responses/AssetSuccess"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/VersionConflict"
  /search/stores:
    get:
      tags: [Search]
      operationId: searchStores
      summary: Search stores by text, location, and filters.
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/Latitude"
        - $ref: "#/components/parameters/Longitude"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Store search results.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Store"
        "429":
          $ref: "#/components/responses/RateLimited"
  /search/assets:
    get:
      tags: [Search]
      operationId: searchAssets
      summary: Search available assets by date/time and filters.
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/StoreIdQuery"
        - $ref: "#/components/parameters/BranchIdQuery"
        - name: start_at
          in: query
          schema:
            $ref: "#/components/schemas/IsoDateTime"
        - name: end_at
          in: query
          schema:
            $ref: "#/components/schemas/IsoDateTime"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Asset search results.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Asset"
        "422":
          $ref: "#/components/responses/ValidationError"
  /pricing/quote:
    post:
      tags: [Pricing]
      operationId: createPricingQuote
      summary: Calculate price and deposit quote before booking.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PricingQuoteRequest"
      responses:
        "200":
          description: Pricing quote.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/PricingQuote"
        "422":
          $ref: "#/components/responses/ValidationError"
  /bookings:
    post:
      tags: [Booking]
      operationId: createBooking
      summary: Create booking with asset hold.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
            examples:
              booking_request:
                value:
                  store_id: store_123
                  branch_id: brn_123
                  asset_ids: [ast_123]
                  start_at: "2026-07-01T02:00:00Z"
                  end_at: "2026-07-01T06:00:00Z"
                  pickup_point_id: point_1
                  return_point_id: point_1
                  payment_method: ONLINE
      responses:
        "201":
          $ref: "#/components/responses/BookingSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Asset unavailable or version conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                asset_unavailable:
                  $ref: "#/components/examples/AssetUnavailableError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /bookings/{id}:
    get:
      tags: [Booking]
      operationId: getBooking
      summary: Get booking by ID.
      parameters:
        - $ref: "#/components/parameters/BookingIdPath"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          $ref: "#/components/responses/BookingSuccess"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /bookings/{id}/cancel:
    post:
      tags: [Booking]
      operationId: cancelBooking
      summary: Cancel booking and calculate refund eligibility.
      parameters:
        - $ref: "#/components/parameters/BookingIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelBookingRequest"
      responses:
        "200":
          $ref: "#/components/responses/BookingSuccess"
        "409":
          $ref: "#/components/responses/VersionConflict"
  /payments:
    post:
      tags: [Payment]
      operationId: createPayment
      summary: Create payment intent or cash payment record.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentRequest"
      responses:
        "201":
          $ref: "#/components/responses/PaymentSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /payment-webhooks/{provider}:
    post:
      tags: [Payment]
      operationId: processPaymentWebhook
      summary: Process provider webhook with server-side verification.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Webhook accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/VersionConflict"
  /bookings/{id}/cash-confirmations:
    post:
      tags: [Payment]
      operationId: confirmCashPayment
      summary: Confirm cash payment by authorized staff.
      parameters:
        - $ref: "#/components/parameters/BookingIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashConfirmationRequest"
      responses:
        "200":
          $ref: "#/components/responses/PaymentSuccess"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/VersionConflict"
  /bookings/{id}/handover:
    post:
      tags: [Handover]
      operationId: handoverBooking
      summary: Perform handover checklist and start rental.
      parameters:
        - $ref: "#/components/parameters/BookingIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandoverRequest"
      responses:
        "200":
          $ref: "#/components/responses/BookingSuccess"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/VersionConflict"
  /ride-sessions:
    post:
      tags: [Ride]
      operationId: createRideSession
      summary: Start ride session for an in-progress rental.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRideSessionRequest"
      responses:
        "201":
          $ref: "#/components/responses/RideSessionSuccess"
        "409":
          $ref: "#/components/responses/VersionConflict"
  /ride-sessions/{id}/chunks:
    post:
      tags: [Ride]
      operationId: uploadRideTrackChunk
      summary: Upload buffered GPS track chunk.
      parameters:
        - $ref: "#/components/parameters/RideSessionIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RideTrackChunk"
      responses:
        "202":
          description: Track chunk accepted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/RideTrackChunk"
        "422":
          $ref: "#/components/responses/ValidationError"
  /ride-sessions/{id}/end:
    post:
      tags: [Ride]
      operationId: endRideSession
      summary: End ride session without closing rental.
      parameters:
        - $ref: "#/components/parameters/RideSessionIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndRideSessionRequest"
      responses:
        "200":
          $ref: "#/components/responses/RideSessionSuccess"
        "409":
          $ref: "#/components/responses/VersionConflict"
  /return-requests:
    post:
      tags: [Return]
      operationId: createReturnRequest
      summary: Request bike return with evidence.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReturnRequest"
      responses:
        "201":
          $ref: "#/components/responses/ReturnRequestSuccess"
        "422":
          $ref: "#/components/responses/ValidationError"
  /return-requests/{id}/accept:
    post:
      tags: [Return]
      operationId: acceptReturnRequest
      summary: Accept return and record inspection.
      parameters:
        - $ref: "#/components/parameters/ReturnRequestIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnInspection"
      responses:
        "200":
          $ref: "#/components/responses/ReturnRequestSuccess"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/VersionConflict"
  /sos-cases:
    post:
      tags: [SOS]
      operationId: createSosCase
      summary: Open SOS case during active ride.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSosCaseRequest"
      responses:
        "201":
          $ref: "#/components/responses/SosCaseSuccess"
        "429":
          $ref: "#/components/responses/RateLimited"
  /sos-cases/{id}/acknowledge:
    post:
      tags: [SOS]
      operationId: acknowledgeSosCase
      summary: Acknowledge SOS case by authorized staff.
      parameters:
        - $ref: "#/components/parameters/SosCaseIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          $ref: "#/components/responses/SosCaseSuccess"
        "403":
          $ref: "#/components/responses/Forbidden"
  /routes:
    post:
      tags: [Content]
      operationId: createRoute
      summary: Submit route content for approval.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Route"
      responses:
        "201":
          description: Route submitted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/Route"
        "422":
          $ref: "#/components/responses/ValidationError"
  /places:
    post:
      tags: [Content]
      operationId: createPlace
      summary: Submit place content for approval.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Place"
      responses:
        "201":
          description: Place submitted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/Place"
        "422":
          $ref: "#/components/responses/ValidationError"
  /content-submissions/{id}/approve:
    post:
      tags: [Content]
      operationId: approveContentSubmission
      summary: Approve route/place/review content.
      parameters:
        - $ref: "#/components/parameters/ContentSubmissionIdPath"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Content approved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ContentSubmission"
        "403":
          $ref: "#/components/responses/Forbidden"
  /reports/store:
    get:
      tags: [Reports]
      operationId: getStoreReport
      summary: Get merchant rental and revenue report.
      parameters:
        - $ref: "#/components/parameters/StoreIdQuery"
        - name: from
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/IsoDateTime"
        - name: to
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/IsoDateTime"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Store report.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/StoreReport"
        "403":
          $ref: "#/components/responses/Forbidden"
  /reports/platform:
    get:
      tags: [Reports]
      operationId: getPlatformReport
      summary: Get platform overview report.
      parameters:
        - name: from
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/IsoDateTime"
        - name: to
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/IsoDateTime"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Platform report.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/PlatformReport"
        "403":
          $ref: "#/components/responses/Forbidden"
  /audit-logs:
    get:
      tags: [Audit]
      operationId: listAuditLogs
      summary: Search audit logs.
      parameters:
        - name: resource_type
          in: query
          schema:
            type: string
        - name: resource_id
          in: query
          schema:
            type: string
        - name: actor_user_id
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Audit log list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AuditLog"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token
    appCheck:
      type: apiKey
      in: header
      name: X-Firebase-AppCheck
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
      example: idem_01HV9X8D9N9HQ
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
      example: req_01HV9X8D9N9HQ
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    SearchQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 120
    Latitude:
      name: latitude
      in: query
      required: false
      schema:
        type: number
        minimum: -90
        maximum: 90
    Longitude:
      name: longitude
      in: query
      required: false
      schema:
        type: number
        minimum: -180
        maximum: 180
    StoreIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    StoreIdNestedPath:
      name: store_id
      in: path
      required: true
      schema:
        type: string
    BranchIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    BookingIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    AssetIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    RideSessionIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    ReturnRequestIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    SosCaseIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    ContentSubmissionIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    StoreMemberIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    StoreIdQuery:
      name: store_id
      in: query
      schema:
        type: string
    BranchIdQuery:
      name: branch_id
      in: query
      schema:
        type: string
  requestBodies:
    CreateStore:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateStoreRequest"
    CreateBranch:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateBranchRequest"
  responses:
    UserSuccess:
      description: User response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/User"
          examples:
            success:
              $ref: "#/components/examples/UserSuccess"
    StoreSuccess:
      description: Store response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Store"
          examples:
            success:
              $ref: "#/components/examples/StoreSuccess"
    BranchSuccess:
      description: Branch response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Branch"
          examples:
            success:
              $ref: "#/components/examples/BranchSuccess"
    AssetSuccess:
      description: Asset response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Asset"
    BookingSuccess:
      description: Booking response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Booking"
          examples:
            success:
              $ref: "#/components/examples/BookingSuccess"
    PaymentSuccess:
      description: Payment response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Payment"
          examples:
            success:
              $ref: "#/components/examples/PaymentSuccess"
    RideSessionSuccess:
      description: Ride session response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RideSession"
    ReturnRequestSuccess:
      description: Return request response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ReturnRequest"
          examples:
            success:
              $ref: "#/components/examples/ReturnSuccess"
    SosCaseSuccess:
      description: SOS case response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/SosCase"
    Unauthorized:
      description: Authentication required or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            unauthorized:
              $ref: "#/components/examples/UnauthorizedError"
    Forbidden:
      description: Permission, tenant, or branch access denied.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            forbidden:
              $ref: "#/components/examples/ForbiddenError"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            not_found:
              $ref: "#/components/examples/NotFoundError"
    VersionConflict:
      description: Optimistic concurrency or idempotency conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            conflict:
              $ref: "#/components/examples/VersionConflictError"
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            validation:
              $ref: "#/components/examples/ValidationError"
    RateLimited:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until retry is allowed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          examples:
            rate_limited:
              $ref: "#/components/examples/RateLimitError"
  schemas:
    SuccessEnvelope:
      type: object
      required: [data, meta]
      properties:
        data: true
        meta:
          $ref: "#/components/schemas/ResponseMeta"
    ResponseMeta:
      type: object
      required: [request_id]
      properties:
        request_id:
          type: string
        correlation_id:
          type: string
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
    PaginationMeta:
      type: object
      properties:
        next_cursor:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 100
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/Error"
    Error:
      type: object
      required: [code, message, details, request_id]
      properties:
        code:
          type: string
          pattern: "^(AUTH|PERMISSION|VALIDATION|USER|STORE|BRANCH|STAFF|ASSET|BOOKING|PAYMENT|RIDE|RETURN|SOS|CONTENT|RATE_LIMIT|INTERNAL)_[A-Z0-9_]+$"
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        request_id:
          type: string
    IsoDateTime:
      type: string
      format: date-time
      examples: ["2026-07-01T02:00:00Z"]
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: integer
          description: Integer minor units only.
          examples: [25000]
        currency:
          type: string
          minLength: 3
          maxLength: 3
          examples: [THB]
    EntityBase:
      type: object
      required: [id, schema_version, created_at, updated_at, version]
      properties:
        id:
          type: string
        schema_version:
          type: integer
          minimum: 1
        tenant_id:
          type: string
        created_at:
          $ref: "#/components/schemas/IsoDateTime"
        created_by:
          type: string
        updated_at:
          $ref: "#/components/schemas/IsoDateTime"
        updated_by:
          type: string
        deleted_at:
          $ref: "#/components/schemas/IsoDateTime"
        version:
          type: integer
          minimum: 0
    User:
      type: object
      required:
        [
          id,
          display_name,
          locale,
          status,
          roles,
          consent_summaries,
          auth_identities,
          version,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
        display_name:
          type: string
        locale:
          type: string
          enum: [th, en]
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, DELETION_REQUESTED]
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"
        email:
          type: string
          format: email
        phone:
          type: string
        consent_summaries:
          type: array
          items:
            $ref: "#/components/schemas/ConsentSummary"
        auth_identities:
          type: array
          items:
            $ref: "#/components/schemas/AuthIdentity"
        deletion_requested_at:
          $ref: "#/components/schemas/IsoDateTime"
        version:
          type: integer
          minimum: 1
        created_at:
          $ref: "#/components/schemas/IsoDateTime"
        updated_at:
          $ref: "#/components/schemas/IsoDateTime"
    AuthIdentity:
      type: object
      required: [provider, provider_subject_hint, verified, last_authenticated_at]
      properties:
        provider:
          type: string
          enum: [PHONE, EMAIL_PASSWORD, GOOGLE, APPLE]
        provider_subject_hint:
          type: string
          description: Masked provider subject for UI display. Raw provider subjects and tokens must never be exposed.
        verified:
          type: boolean
        last_authenticated_at:
          $ref: "#/components/schemas/IsoDateTime"
    ConsentSummary:
      type: object
      required: [type, status, version_code, purpose, granted_at]
      properties:
        type:
          $ref: "#/components/schemas/ConsentType"
        status:
          $ref: "#/components/schemas/ConsentStatus"
        version_code:
          type: string
        purpose:
          type: string
        granted_at:
          $ref: "#/components/schemas/IsoDateTime"
        gps_scope:
          $ref: "#/components/schemas/GpsConsentScope"
    Role:
      type: string
      enum: [RENTER, STORE_OWNER, STORE_MANAGER, STORE_STAFF, STORE_ACCOUNTING, PLATFORM_ADMIN, PLATFORM_MODERATOR, PLATFORM_SUPPORT]
    OnboardingSelectableRole:
      type: string
      enum: [RENTER, STORE_OWNER]
    ConsentType:
      type: string
      enum: [TERMS, PRIVACY, GPS, MARKETING]
    ConsentStatus:
      type: string
      enum: [GRANTED, DENIED, REVOKED]
    GpsConsentScope:
      type: string
      enum: [FOREGROUND_ONLY, BACKGROUND_ALLOWED]
    Store:
      allOf:
        - $ref: "#/components/schemas/EntityBase"
        - type: object
          required: [owner_user_id, legal_name, display_name, default_currency, timezone, approval_status, operational_status, document_metadata]
          properties:
            owner_user_id:
              type: string
            legal_name:
              type: string
            display_name:
              type: string
            description:
              type: string
            phone:
              type: string
            email:
              type: string
              format: email
            default_currency:
              type: string
            timezone:
              type: string
            approval_status:
              $ref: "#/components/schemas/StoreApprovalStatus"
            operational_status:
              $ref: "#/components/schemas/StoreOperationalStatus"
            commission_plan_id:
              type: string
            document_metadata:
              type: array
              items:
                $ref: "#/components/schemas/StoreDocumentMetadata"
            submitted_at:
              $ref: "#/components/schemas/IsoDateTime"
            reviewed_at:
              $ref: "#/components/schemas/IsoDateTime"
            reviewed_by:
              type: string
            decision_reason:
              type: string
    StoreApprovalStatus:
      type: string
      enum: [DRAFT, SUBMITTED, UNDER_REVIEW, REVISION_REQUIRED, APPROVED, REJECTED, SUSPENDED, CLOSED]
    StoreOperationalStatus:
      type: string
      enum: [DRAFT, ACTIVE, INACTIVE, SUSPENDED, CLOSED]
    StoreDocumentMetadata:
      type: object
      required: [id, type, storage_object_ref, file_name, content_type, size_bytes, status, uploaded_at]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [BUSINESS_REGISTRATION, TAX_DOCUMENT, OWNER_IDENTITY, STORE_PHOTO, OTHER]
        storage_object_ref:
          type: string
          description: Storage object reference only; clients must not send raw document bytes through this API.
        file_name:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [PENDING_REVIEW, APPROVED, REJECTED]
        uploaded_at:
          $ref: "#/components/schemas/IsoDateTime"
    Branch:
      allOf:
        - $ref: "#/components/schemas/EntityBase"
        - type: object
          required: [store_id, name, address, country, latitude, longitude, timezone, status]
          properties:
            store_id:
              type: string
            name:
              type: string
            address:
              type: string
            province:
              type: string
            district:
              type: string
            country:
              type: string
            latitude:
              type: number
            longitude:
              type: number
            geohash:
              type: string
            phone:
              type: string
            opening_hours:
              type: object
              additionalProperties: true
            timezone:
              type: string
            status:
              type: string
              enum: [ACTIVE, TEMPORARILY_CLOSED, INACTIVE]
            temporary_closure:
              $ref: "#/components/schemas/TemporaryClosure"
            available_for_booking:
              type: boolean
    TemporaryClosure:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
        reopen_at:
          $ref: "#/components/schemas/IsoDateTime"
    StoreMember:
      allOf:
        - $ref: "#/components/schemas/EntityBase"
        - type: object
          required: [store_id, user_id, role, branch_ids, status]
          properties:
            store_id:
              type: string
            user_id:
              type: string
            role:
              $ref: "#/components/schemas/Role"
            branch_ids:
              type: array
              items:
                type: string
            permissions:
              type: array
              items:
                type: string
            granted_permissions:
              type: array
              items:
                type: string
            denied_permissions:
              type: array
              items:
                type: string
            status:
              type: string
              enum: [ACTIVE, SUSPENDED]
    StaffInvitation:
      type: object
      required: [id, store_id, role, channel, branch_ids, permission_overrides, status]
      properties:
        id:
          type: string
        store_id:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        channel:
          type: string
          enum: [EMAIL, PHONE, LINK, QR]
        phone:
          type: string
        email:
          type: string
          format: email
        invite_link_hint:
          type: string
          description: Masked invitation link/QR reference; raw invitation secrets are never returned.
        branch_ids:
          type: array
          items:
            type: string
        permission_overrides:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [PENDING, ACCEPTED, EXPIRED, CANCELLED]
    Asset:
      allOf:
        - $ref: "#/components/schemas/EntityBase"
        - type: object
          required: [store_id, branch_id, category_id, code, status, base_price, deposit_amount, currency]
          properties:
            store_id:
              type: string
            branch_id:
              type: string
            category_id:
              type: string
            code:
              type: string
            qr_token_reference:
              type: string
            brand:
              type: string
            model:
              type: string
            color:
              type: string
            size:
              type: string
            description:
              type: string
            status:
              type: string
              enum: [AVAILABLE, RESERVED, PREPARING, AWAITING_HANDOVER, RENTED, RETURN_PENDING, INSPECTION_PENDING, MAINTENANCE, INACTIVE, LOST]
            base_price:
              type: integer
            deposit_amount:
              type: integer
            currency:
              type: string
            current_point_id:
              type: string
            images:
              type: array
              items:
                type: string
    Equipment:
      allOf:
        - $ref: "#/components/schemas/EntityBase"
        - type: object
          required: [store_id, name, rental_mode, status]
          properties:
            store_id:
              type: string
            name:
              type: string
            rental_mode:
              type: string
              enum: [SEPARATE, BUNDLED, PACKAGE_INCLUDED, DEPOSIT_REQUIRED]
            status:
              type: string
              enum: [AVAILABLE, RENTED, MAINTENANCE, INACTIVE]
            price_amount:
              type: integer
            deposit_amount:
              type: integer
            currency:
              type: string
    RentalPoint:
      allOf:
        - $ref: "#/components/schemas/EntityBase"
        - type: object
          required: [store_id, branch_id, name, latitude, longitude, status]
          properties:
            store_id:
              type: string
            branch_id:
              type: string
            name:
              type: string
            latitude:
              type: number
            longitude:
              type: number
            status:
              type: string
              enum: [ACTIVE, INACTIVE]
    Booking:
      allOf:
